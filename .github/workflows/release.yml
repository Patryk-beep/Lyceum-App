name: Release

# Builds signed installers for macOS (arm + intel), Windows and Linux and drafts a
# GitHub Release. Requires repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — updater private key (tauri signer generate)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — its password (empty string if none)
#   APPLE_* / WINDOWS_* signing secrets — for notarized/codesigned installers (optional)
# To emit updater artifacts (latest.json + .sig), set bundle.createUpdaterArtifacts
# to true (or pass it via the tauri-action `args`).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux webview deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - run: pnpm config set verify-deps-before-run false
      - run: pnpm install --frozen-lockfile

      # Emit updater artifacts (+ latest.json) ONLY when an updater signing key is
      # configured. Without the key, `createUpdaterArtifacts` would FAIL the build, so a
      # secretless release builds plain (unsigned, no self-update) instead of breaking.
      - name: Enable updater artifacts when a signing key is set
        id: updater
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "args=--config src-tauri/tauri.updater.conf.json" >> "$GITHUB_OUTPUT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
            echo "::notice::TAURI_SIGNING_PRIVATE_KEY unset — building WITHOUT updater artifacts (unsigned release)."
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (no-op when unset → see the step above).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer ID + notarization. tauri-action SKIPS macOS signing when
          # APPLE_CERTIFICATE is empty, so the bundle stays ad-hoc-signed (config "-").
          # When set, APPLE_SIGNING_IDENTITY overrides the ad-hoc "-" with the real cert.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # Notarization via an App Store Connect API key (.p8) — preferred over APPLE_ID/password.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          # Windows signing: set bundle.windows.signCommand (e.g. trusted-signing-cli) in a
          # release-only --config once you have a cert, and pass these. Empty → unsigned (SmartScreen).
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "Lyceum ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} ${{ steps.updater.outputs.args }}
