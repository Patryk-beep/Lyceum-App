name: Release

# Builds installers for macOS (arm + intel), Windows and Linux and drafts a
# GitHub Release. The draft is created EXACTLY ONCE by the create-release job; the
# build matrix then only UPLOADS to it (via releaseId), so the four parallel legs
# can't race into duplicate or asset-incomplete drafts (the failure mode that
# would break the one-line installers). Publish the draft to go live.
#
# Requires repo secrets (all optional — absent ⇒ unsigned early-access build):
#   TAURI_SIGNING_PRIVATE_KEY          — updater private key (tauri signer generate)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — its password (empty string if none)
#   APPLE_* / AZURE_* signing secrets  — for notarized/codesigned installers
# To emit updater artifacts (latest.json + .sig), set TAURI_SIGNING_PRIVATE_KEY —
# the build then enables bundle.createUpdaterArtifacts via the --config below.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

# One release pipeline per tag — a re-pushed tag waits rather than racing the
# in-flight run (cancel-in-progress:false so a started build is never half-killed).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Create the draft release a single time so the build matrix has one stable
  # target to upload to (prevents the parallel find-or-create race).
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create the draft release once
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Lyceum ${tag}`,
              draft: true,
              prerelease: false,
            });
            core.setOutput('release_id', data.id);

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux webview deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - run: pnpm config set verify-deps-before-run false
      - run: pnpm install --frozen-lockfile

      # Emit updater artifacts (+ latest.json) ONLY when an updater signing key is
      # configured. Without the key, `createUpdaterArtifacts` would FAIL the build, so a
      # secretless release builds plain (unsigned, no self-update) instead of breaking.
      - name: Enable updater artifacts when a signing key is set
        id: updater
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "args=--config src-tauri/tauri.updater.conf.json" >> "$GITHUB_OUTPUT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
            echo "::notice::TAURI_SIGNING_PRIVATE_KEY unset — building WITHOUT updater artifacts (unsigned release)."
          fi

      # Export the Apple code-signing vars to the job env ONLY when a real certificate
      # is configured. Passing an EMPTY APPLE_CERTIFICATE makes tauri-bundler attempt
      # `security import` on empty data ("SecKeychainItemImport: parameters not valid")
      # and FAIL the macOS bundle. ABSENT (not empty) → the bundler ad-hoc signs via
      # tauri.conf.json signingIdentity "-", which is exactly what the unsigned phase wants.
      - name: Configure Apple code-signing when a certificate is set
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            {
              echo "APPLE_CERTIFICATE<<__LYCEUM_EOF__"; echo "$APPLE_CERTIFICATE"; echo "__LYCEUM_EOF__"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
              echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD"
              echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
              echo "APPLE_API_KEY<<__LYCEUM_EOF__"; echo "$APPLE_API_KEY"; echo "__LYCEUM_EOF__"
              echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH"
            } >> "$GITHUB_ENV"
            echo "::notice::APPLE_CERTIFICATE present — macOS bundle will be Developer-ID signed/notarized."
          else
            echo "::notice::No APPLE_CERTIFICATE — macOS bundle stays ad-hoc signed (signingIdentity '-')."
          fi

      # Builds the bundles and UPLOADS them to the pre-created draft (releaseId).
      # No tagName/releaseDraft here — the create-release job owns the release.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (no-op when unset → see the updater step above).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing vars are injected into $GITHUB_ENV by the step above ONLY when a
          # certificate is configured — NEVER passed empty here (empty breaks the bundle).
          # Windows signing: set bundle.windows.signCommand in a release-only --config once
          # you have a cert, then pass these. Empty → unsigned (SmartScreen) — proven harmless.
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        with:
          projectPath: app
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }} ${{ steps.updater.outputs.args }}
